name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TinaCMS admin (best-effort)
        env:
          TINA_PUBLIC_CLIENT_ID: ${{ secrets.TINA_PUBLIC_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
        if: ${{ env.TINA_TOKEN != '' }}
        # If tinacms build fails (e.g. TinaCloud branch not registered yet),
        # log it and continue — astro build still ships the rest of the site.
        run: |
          set +e
          npx tinacms build
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "::warning::tinacms build failed (rc=$rc); deploy will continue without /admin/. Most likely TinaCloud branch isn't registered yet."
          else
            echo "tinacms build succeeded; /admin/ will be in the deploy."
          fi
          exit 0

      - name: Build Astro site
        env:
          TINA_PUBLIC_CLIENT_ID: ${{ secrets.TINA_PUBLIC_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
