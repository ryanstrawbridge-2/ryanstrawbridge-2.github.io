# Pages CMS configuration
# Edit this site at https://app.pagescms.org
# Docs: https://pagescms.org/docs/

media:
  - name: project-images
    label: Project images
    input: src/assets/images
    # The output path is handled per-field (see hero/body image fields below)
    # so the path stored in the markdown matches what Astro expects.

content:
  - name: home
    label: Home page
    type: file
    path: src/data/home.json
    description: Edit the text on the home page (hero, experience, about, contact).
    fields:
      - name: hero
        label: Hero
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow tag, type: string }
          - { name: tagline, label: Tagline (big quote under the name), type: string }
          - { name: lede, label: Lede (paragraph below tagline), type: text }
          - name: primaryCta
            label: Primary button
            type: object
            fields:
              - { name: label, label: Label, type: string }
              - { name: href, label: Link, type: string }
          - name: secondaryCta
            label: Secondary button
            type: object
            fields:
              - { name: label, label: Label, type: string }
              - { name: href, label: Link, type: string }
      - name: projectsSection
        label: Projects section heading
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string }
          - { name: title, label: Heading, type: string }
      - name: experienceSection
        label: Experience section
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string }
          - { name: title, label: Heading, type: string }
          - name: items
            label: Experience cards
            type: object
            list: true
            fields:
              - { name: role, label: Role, type: string }
              - { name: org, label: Organization, type: string }
              - { name: blurb, label: Blurb, type: text }
              - name: logoKey
                label: Logo
                type: select
                description: Pick which company logo to show. To add a new logo, ask Claude.
                options:
                  values: [cfs, raytheon, aeronu]
      - name: aboutSection
        label: About section
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: lede, label: Lede (intro sentence), type: text }
          - name: bio
            label: Bio
            type: text
            description: Use a blank line between paragraphs.
      - name: interestsSection
        label: Interests section
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string }
          - { name: title, label: Heading, type: string }
          - name: items
            label: Interest cards
            type: object
            list: true
            fields:
              - { name: title, label: Title, type: string }
              - name: imageKey
                label: Main image
                type: select
                description: Larger main photo for this card. To add a new one, ask Claude.
                options:
                  values: [running, music, plants]
              - name: extraImageKeys
                label: Extra thumbnail images
                type: select
                list: true
                description: Optional smaller photos shown below the main one (up to ~4).
                options:
                  values:
                    [
                      'running-2',
                      'running-3',
                      'music-2',
                      'music-3',
                      'plants-2',
                      'plants-3',
                    ]
              - { name: alt, label: Alt text, type: string }
              - { name: body, label: Body, type: text }
      - name: contactSection
        label: Contact section
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: body, label: Body, type: text }
          - { name: email, label: Email, type: string }
          - { name: phone, label: Phone, type: string }

  - name: projects
    label: Projects
    type: collection
    path: src/content/projects
    filename: '{primary}.md'
    view:
      fields: [title, organization, date, draft]
      primary: title
      sort: [order, date]
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: subtitle
        label: Subtitle
        type: string
        description: Optional one-line tagline shown under the title.
      - name: organization
        label: Organization
        type: string
        description: Company or club where this work happened (shown on cards).
      - name: date
        label: Date
        type: date
        required: true
        options:
          format: yyyy-MM-dd
      - name: summary
        label: Summary
        type: text
        required: true
        description: One-sentence summary used on project cards and previews.
      - name: hero
        label: Hero image
        type: image
        required: true
        description: Main image shown on the project card and at the top of the page.
        options:
          input: src/assets/images/projects/{primary}
          output: '../../assets/images/projects/{primary}/{name}{extension}'
      - name: heroAlt
        label: Hero alt text
        type: string
        required: true
        description: Describe the image for screen readers.
      - name: tools
        label: Tools / skills
        type: string
        list: true
        default: []
        description: Listed as tags on the project page.
      - name: order
        label: Display order
        type: number
        default: 0
        description: Lower numbers appear first. Ties broken by date (newer first).
      - name: draft
        label: Draft (hide from live site)
        type: boolean
        default: false
        description: Toggle on to hide this project from the published site.
      - name: body
        label: Body
        type: rich-text
        description: |
          Use ## headings for sections (Problem, What I did, Outcome, Gallery).
          Drop in images with the image button — they'll be uploaded next to the hero.
        options:
          image:
            input: src/assets/images/projects/{primary}
            output: '../../assets/images/projects/{primary}/{name}{extension}'

settings:
  content:
    merge: true
