backend:
  name: github
  repo: ryanstrawbridge-2/ryanstrawbridge-2.github.io
  branch: main
  base_url: https://auth.sveltia.app

# Default media uploads location (used when a field doesn't specify its own)
media_folder: "src/assets/images/uploads"
public_folder: "/src/assets/images/uploads"

# UI settings
site_url: https://ryanstrawbridge-2.github.io
display_url: https://ryanstrawbridge-2.github.io
logo_url: /favicon.svg

# Files committed by the CMS will use this commit message format
commit_messages:
  create: "cms: create {{collection}} '{{slug}}'"
  update: "cms: update {{collection}} '{{slug}}'"
  delete: "cms: delete {{collection}} '{{slug}}'"
  uploadMedia: "cms: upload media '{{path}}'"
  deleteMedia: "cms: delete media '{{path}}'"

collections:
  - name: projects
    label: Projects
    label_singular: Project
    description: >-
      Edit, add, or remove portfolio projects. Each project has a hero image,
      metadata, and a Markdown body with optional gallery images.
    folder: src/content/projects
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}} — {{date | date('YYYY')}}{{#if draft}} (DRAFT){{/if}}"
    fields:
      - { label: "Title", name: title, widget: string }

      - {
          label: "Subtitle",
          name: subtitle,
          widget: string,
          required: false,
          hint: "Optional one-line tagline shown under the title.",
        }

      - {
          label: "Organization",
          name: organization,
          widget: string,
          required: false,
          hint: "Company / club where this work happened. Shown on cards.",
        }

      - { label: "Date", name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, picker_utc: true }

      - {
          label: "Summary",
          name: summary,
          widget: text,
          hint: "One-sentence summary used on project cards and previews.",
        }

      - label: "Hero image"
        name: hero
        widget: image
        media_folder: "/src/assets/images/projects/{{slug}}"
        public_folder: "../../assets/images/projects/{{slug}}"
        hint: "Main image shown on the project card and at the top of the project page."

      - { label: "Hero alt text", name: heroAlt, widget: string, hint: "Describe the image for screen readers." }

      - {
          label: "Tools / skills",
          name: tools,
          widget: list,
          default: [],
          field: { label: "Tool", name: tool, widget: string },
          hint: "Listed as tags on the project page.",
        }

      - {
          label: "Display order",
          name: order,
          widget: number,
          default: 0,
          value_type: int,
          hint: "Lower numbers appear first. Ties broken by date (newer first).",
        }

      - {
          label: "Draft (hide from live site)",
          name: draft,
          widget: boolean,
          default: false,
          required: false,
          hint: "Toggle on to hide this project from the published site.",
        }

      - label: "Body"
        name: body
        widget: markdown
        editor_components: ["image", "code-block"]
        hint: |
          Use ## headings for sections (Problem, What I did, Outcome, Gallery).
          Drop images inline with the image button — they'll be uploaded next to the hero.
        media_folder: "/src/assets/images/projects/{{slug}}"
        public_folder: "../../assets/images/projects/{{slug}}"
