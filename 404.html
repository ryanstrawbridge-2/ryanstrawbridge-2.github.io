<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found · Ryan Strawbridge</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .nf {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .nf-code {
      font-family: var(--font-mono);
      color: var(--accent);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    .nf h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      margin: 0 0 12px;
      letter-spacing: -0.02em;
    }
    .nf p { color: var(--fg-muted); max-width: 50ch; margin: 0 0 24px; }
  </style>
</head>
<body>
  <main class="nf">
    <p class="nf-code">404</p>
    <h1>This page wandered off.</h1>
    <p>The page you're looking for doesn't exist or has moved. Let's get you back on track.</p>
    <a class="btn btn-primary" href="/">Take me home</a>
  </main>
  <script>
    const stored = localStorage.getItem("theme");
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.setAttribute("data-theme", stored || (prefersDark ? "dark" : "light"));
  </script>
</body>
</html>
